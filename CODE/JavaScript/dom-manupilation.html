<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h6><u>DOM Manipulation</u></h6>

    <h3 id="first-name"></h3>
    <div id="middle-name"></div>
    <div id="last-name"></div>
    <div class=""></div>

    <script>
        document.getElementById("first-name").innerText = "Thusha"
        document.getElementById("last-name").innerHTML = "<h2>Nika</h2>"
        document.getElementById("middle-name").innerText = "<h2>Sha</h2>"
    </script>
</body>

</html>
