<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <h1>Student Result Manager</h1>
 
<div class="form">

  <input type="text" name="nameInput" id="nameInput" placeholder="Student Name" />

  <input type="number" name="math" id="math" placeholder="Math Marks" />

  <input type="number" name="science" id="science" placeholder="Science Marks" />

  <input type="number" name="english" id="english" placeholder="English Marks" />

  <button onclick="addRecord()">Add Record</button>
</div>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Name</th>
      <th>Maths</th>
      <th>Science</th>
      <th>English</th>
      <th>Total</th>
      <th>Average</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src=".js"></script>

</body>
</html>
