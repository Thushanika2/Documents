    <h1>Student Marks</h1>

    <div class="form">
      <input type="text" id="nameInput" placeholder="Student name" />

      <input type="number" id="maths" placeholder="Maths mark" />
      <input type="number" id="science" placeholder="Science mark" />
      <input type="number" id="english" placeholder="English mark" />

      <button onclick="addRecords()">Add</button>
    </div>

          <th>Total</th>
          <th>Average</th>
        </tr>
      </thead>
      <tbody id="student-data"></tbody>
    </table>

        const nameInput = document.getElementById("nameInput").value;

        const s = Number(science);
        const e = Number(english);

        const total = m + s + e;
        const Average = (total / 3).toFixed(2);

      function displayRecodes() {
        const table = document.getElementById("student-data");
        table.innerHTML = "";

        records.forEach((rec, index) => {
          const row = `
                    <tr>
                   <td>${index + 1}</td>
                   <td>${rec[0]}</td>
                   <td>${rec[1]}</td>
                   <td>${rec[2]}</td>
                   <td>${rec[3]}</td>
                   <td>${rec[4]}</td>

            `;
