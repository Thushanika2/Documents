<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="title">Student Registration Form</div>
    <form action="#">
    <div class="input-box">
        <label for="fname">Full Name</label>
        <input type="text" placeholder="Enter your name" minlength="3" required>
    </div>
    <div class="input-box">
        <label for="email">Email</label>
        <input type="email" placeholder="Enter your email" required>
    </div>
    <div class="input-box">
        <label for="tel">Phone Number</label>
        <input type="tel" placeholder="Enter phone number" minlength="10" maxlength="10" required>
    </div>
    <div class="input-box">
        <label for="age">Age</label>
        <input type="number" placeholder="Enter age" min="16" max="55" required>
    </div>
    <div class="input-box">
        <label for="password">Password</label>
        <input type="password" placeholder="Enter password" >
    </div>
    </form>
</div>
</body>
</html>
