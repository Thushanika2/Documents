<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="styles (1).css">
</head>

<body>
    <div class="container">
        <h2>Student Registration Form</h2>

        <form>
            <!-- Row 1 -->
            <div class="row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name" minlength="3" required />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email" required />
                </div>
            </div>

            <!-- Row 2 -->
            <div class="row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="number" placeholder="Enter phone number" pattern="[0-9] {10}" required />
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" placeholder="Enter age" min="16" max="60" required />
                </div>
            </div>

            <!-- Row 3 -->
            <div class="row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" minlength="6" required />
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" required />
                </div>
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label for="gender">Gender</label>
                <div class="inline">
                    <label><input type="radio" name="gender" required />
                        Male</label>

                    <label><input type="radio" name="gender" required />
                        Female</label>
                </div>
            </div>

            <!-- Skills -->
            <div class="form-group">
                <label>Skills</label>
                <div class="inline">
                    <label><input type="checkbox" />
                        HTML</label>

                    <label><input type="checkbox" />
                        CSS</label>

                    <label><input type="checkbox" />
                        JavaScript</label>
                </div>
            </div>

            <!-- country -->
            <div class="form-group">
                <label>Country</label>
                <select required>
                    <option>Select Country</option>
                    <option>Sri lanka</option>
                    <option>India</option>
                    <option>UK</option>
                </select>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>Address</label>
                <textarea placeholder="Enter address" required></textarea>
            </div>

            <!-- Message -->
            <div class="form-group">
                <label for="message">Message</label>
                <textarea placeholder="Enter message" required></textarea>
            </div>
            <!-- Button -->
            <button type="submit">Register</button>
        </form>
    </div>
</body>

</html>
